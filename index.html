<!doctype html>
<html lang="zh-CN">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover, maximum-scale=1, user-scalable=no">
<meta name="theme-color" content="#fbeef6">
<title>数学奇境 · 穿越数学史</title>
<link rel="manifest" href="manifest.json">
<style>
:root{
  --pink:#f6a5c0; --pink-d:#e87ba6; --lav:#b8a4e3; --lav-d:#9a82d4;
  --rose:#d9a066; --rose-hi:#e9c39a;                 /* 玫瑰金描边 */
  --ink:#5a4a63; --muted:#9c8aa6;
  --cream:#fffdfb; --glass:rgba(255,255,255,.74); --glass-2:rgba(255,255,255,.58);
  --line:rgba(217,160,102,.32);                       /* 玫瑰金细线 */
  --good:#4bbf8f; --good-ink:#2f8f68; --bad:#ec7a97; --bad-ink:#c14e6f;
  --serif:"PingFang SC","Hiragino Sans GB","Microsoft YaHei",sans-serif;
}
*{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
html,body{margin:0;padding:0}
body{
  font-family:-apple-system,"PingFang SC","Hiragino Sans GB","Microsoft YaHei",sans-serif;
  color:var(--ink); min-height:100vh; overscroll-behavior-y:none; -webkit-text-size-adjust:100%;
  background:
    radial-gradient(circle at 12% 6%, #ffe1ee 0, transparent 34%),
    radial-gradient(circle at 88% 12%, #ece0ff 0, transparent 36%),
    radial-gradient(circle at 50% 100%, #fdeafc 0, transparent 46%),
    linear-gradient(158deg,#fffaf6 0%,#fbeef6 46%,#efe8fc 100%);
  background-attachment:fixed;
}
#app{max-width:760px;margin:0 auto;min-height:100vh;position:relative;padding-bottom:88px}
button{font-family:inherit;cursor:pointer;border:none;background:none;color:inherit}
.hidden{display:none!important}

/* ---------- 顶栏 ---------- */
.topbar{position:sticky;top:0;z-index:20;display:flex;align-items:center;gap:8px;
  padding:calc(env(safe-area-inset-top) + 12px) 16px 12px;
  background:linear-gradient(180deg,rgba(255,251,248,.96),rgba(255,246,250,.82));
  box-shadow:0 4px 20px rgba(180,130,170,.12)}
.topbar .back{font-size:26px;color:var(--lav-d);width:32px;line-height:1}
.topbar h1{flex:1;margin:0;font-family:var(--serif);font-size:19px;font-weight:700;
  min-width:0;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;
  letter-spacing:.06em;color:#6a4f6e;
  background:linear-gradient(100deg,var(--pink-d),var(--lav-d));-webkit-background-clip:text;background-clip:text;-webkit-text-fill-color:transparent}
.purse{display:flex;gap:8px;font-size:13px;font-weight:800}
.chip{background:var(--glass);border:1px solid var(--line);box-shadow:0 4px 12px rgba(180,130,170,.14);
  color:#8a6f8f;padding:5px 11px;border-radius:20px;display:flex;align-items:center;gap:4px}

/* ---------- 地图首页 ---------- */
.map{padding:10px 16px 22px}
.guide{display:flex;gap:13px;align-items:center;border-radius:22px;padding:15px 17px;margin:8px 0 18px;
  background:linear-gradient(135deg,rgba(255,236,246,.9),rgba(238,230,255,.9));
  border:1px solid rgba(255,255,255,.85);box-shadow:0 12px 30px rgba(175,130,175,.16)}
.guide .ow{font-size:42px;filter:drop-shadow(0 4px 6px rgba(180,130,170,.28))}
.guide .bubble{flex:1;color:#6b5a72;font-size:14px;line-height:1.6}
.guide .bubble b{color:var(--pink-d);font-weight:700}
.civ{position:relative;display:flex;gap:14px;align-items:center;padding:16px 17px;margin-bottom:15px;
  border-radius:24px;background:var(--glass);border:1px solid rgba(255,255,255,.9);
  box-shadow:0 12px 30px rgba(175,130,175,.15);transition:transform .14s,box-shadow .2s}
.civ:active{transform:scale(.985)}
.civ.locked{background:rgba(244,238,246,.6);box-shadow:none;color:#b3a7bb;filter:saturate(.5)}
.civ .ico{font-size:42px;width:54px;text-align:center;filter:drop-shadow(0 4px 5px rgba(180,130,170,.2))}
.civ .info{flex:1;min-width:0}
.civ .nm{font-family:var(--serif);font-size:18px;font-weight:700;color:#5f4a67;display:flex;align-items:center;gap:8px}
.civ .tag{font-family:-apple-system,sans-serif;font-size:10px;font-weight:800;letter-spacing:.02em;color:#fff;
  background:linear-gradient(120deg,var(--pink),var(--lav));padding:3px 9px;border-radius:11px}
.civ .pl{font-size:12px;color:var(--muted);margin-top:3px}
.civ .bl{font-size:12px;color:#8a7d92;margin-top:7px;line-height:1.5}
.civ .st{position:absolute;top:14px;right:16px;font-size:14px;letter-spacing:1px}
.civ .lockicon{position:absolute;top:16px;right:16px;font-size:19px;opacity:.6}
.wonderbar{margin:2px 0 20px;padding:14px 16px;border-radius:20px;
  background:linear-gradient(135deg,rgba(255,244,250,.8),rgba(245,238,255,.8));
  border:1px dashed var(--line)}
.wonderbar .t{color:#a86f8f;font-size:12.5px;font-weight:800;margin-bottom:10px}
.wonderbar .row{display:flex;gap:12px;flex-wrap:wrap}
.wonderbar .w{font-size:30px;filter:grayscale(1) opacity(.32)}
.wonderbar .w.got{filter:drop-shadow(0 3px 5px rgba(180,130,170,.3))}

/* ---------- 站内 / 三层深度 ---------- */
.depths{padding:10px 16px 22px}
.depth{display:flex;gap:15px;align-items:center;padding:19px 18px;margin-bottom:15px;border-radius:24px;
  background:var(--glass);border:1px solid rgba(255,255,255,.9);border-left:6px solid var(--c);
  box-shadow:0 12px 30px rgba(175,130,175,.15);transition:transform .14s}
.depth:active{transform:scale(.985)}
.depth .ico{font-size:34px;width:46px;text-align:center;filter:drop-shadow(0 3px 4px rgba(180,130,170,.2))}
.depth .nm{font-family:var(--serif);font-size:18px;font-weight:700;color:#5f4a67}
.depth .ds{font-size:12.5px;color:#8a7d92;margin-top:4px;line-height:1.5}
.depth .done{margin-left:auto;font-size:22px;color:var(--good)}

/* ---------- 练习/挑战通用卡 ---------- */
.stage{padding:16px}
.qcard{background:var(--glass);border:1px solid rgba(255,255,255,.9);border-radius:26px;
  padding:24px 21px;box-shadow:0 16px 40px rgba(175,130,175,.18);min-height:130px}
.qmeta{display:flex;justify-content:space-between;font-size:12px;color:var(--pink-d);font-weight:800;margin-bottom:12px}
.qtext{font-size:23px;font-weight:800;line-height:1.5;text-align:center;padding:8px 0;color:#5a4a63}
.qtext .glyph{font-size:34px;letter-spacing:4px;margin:12px 0;color:#a06f8a}
.tower{font-size:19px;line-height:1.9;text-align:center;margin:14px 0;color:#8a5f82;font-weight:800}
.tower span{display:block}
.tower span:first-child{font-size:26px;color:var(--pink-d)}
.opts{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-top:20px}
.opt{background:#fff;border:2px solid var(--line);border-radius:18px;padding:16px;font-size:19px;
  font-weight:800;text-align:center;color:#6a5a72;transition:transform .1s}
.opt:active{transform:scale(.96)}
.opt.right{background:linear-gradient(135deg,#7fe0b8,var(--good));color:#fff;border-color:var(--good)}
.opt.wrong{background:linear-gradient(135deg,#f5a6bc,var(--bad));color:#fff;border-color:var(--bad)}
.answerbox{display:flex;gap:11px;margin-top:20px}
.answerbox input{flex:1;font-size:24px;font-weight:800;text-align:center;padding:13px;border-radius:16px;
  border:2px solid var(--line);background:#fff;color:var(--ink);min-width:0;transition:border-color .2s,box-shadow .2s}
.answerbox input:focus{outline:none;border-color:var(--pink);box-shadow:0 0 0 4px rgba(246,165,192,.22)}
.btn{background:linear-gradient(135deg,var(--pink),var(--lav));color:#fff;font-weight:800;
  border-radius:16px;padding:14px 18px;font-size:16px;box-shadow:0 8px 20px rgba(184,124,190,.34)}
.btn:active{transform:translateY(2px);box-shadow:0 4px 12px rgba(184,124,190,.34)}
.btn.wide{width:100%;margin-top:18px}
.btn.ghost{background:rgba(246,165,192,.16);color:var(--pink-d);box-shadow:none;border:1px solid var(--line)}
.feedback{margin-top:18px;padding:15px 17px;border-radius:18px;font-size:14px;line-height:1.6;display:none}
.feedback.show{display:block;animation:pop .25s}
.feedback.ok{background:rgba(75,191,143,.12);color:var(--good-ink);border:1px solid rgba(75,191,143,.34)}
.feedback.no{background:rgba(236,122,151,.12);color:var(--bad-ink);border:1px solid rgba(236,122,151,.34)}
@keyframes pop{from{transform:translateY(8px);opacity:0}to{transform:translateY(0);opacity:1}}

/* 思路提示逐条 */
.hints{margin-top:15px}
.hint{background:linear-gradient(135deg,rgba(255,244,250,.9),rgba(244,238,255,.9));
  border-left:4px solid var(--pink);border-radius:12px;padding:12px 14px;margin-bottom:10px;
  font-size:14px;line-height:1.6;color:#6b5a72;animation:pop .3s}
.hint b{color:var(--pink-d)}
.bigidea{margin-top:15px;padding:16px 18px;border-radius:20px;
  background:linear-gradient(135deg,#efe4ff,#ffe6f2);border:1px solid var(--line);
  color:#5f4a67;font-size:13.5px;line-height:1.65}
.bigidea .t{color:var(--lav-d);font-weight:800;margin-bottom:7px}
.bigidea b{color:var(--pink-d)}
.readcard{background:var(--glass);border:1px solid rgba(255,255,255,.9);border-radius:22px;padding:20px;
  margin-bottom:15px;box-shadow:0 12px 30px rgba(175,130,175,.14)}
.readcard .h{font-family:var(--serif);font-size:18px;font-weight:700;color:#5f4a67;display:flex;align-items:center;gap:9px;margin-bottom:11px}
.readcard .b{font-size:14.5px;line-height:1.75;color:#6f6277}
.progress{height:9px;background:rgba(184,124,190,.14);border-radius:6px;overflow:hidden;margin:12px 0}
.progress i{display:block;height:100%;background:linear-gradient(90deg,var(--pink),var(--lav));width:0;transition:width .3s}

/* ---------- 奖励页 ---------- */
.rewards{padding:16px}
.panel{background:var(--glass);border:1px solid rgba(255,255,255,.9);border-radius:22px;padding:19px;
  margin-bottom:15px;box-shadow:0 12px 30px rgba(175,130,175,.14)}
.panel h3{margin:0 0 13px;font-family:var(--serif);font-size:16.5px;color:#5f4a67}
.cal{display:grid;grid-template-columns:repeat(7,1fr);gap:6px}
.cal .d{aspect-ratio:1;border-radius:10px;background:rgba(184,124,190,.08);display:flex;align-items:center;justify-content:center;font-size:15px}
.cal .d.on{background:linear-gradient(135deg,var(--pink),var(--lav));color:#fff}
.wondergrid{display:grid;grid-template-columns:repeat(4,1fr);gap:11px;text-align:center}
.wondergrid .w{font-size:34px;padding:10px 0;border-radius:14px;background:rgba(184,124,190,.07)}
.wondergrid .w.got{background:linear-gradient(135deg,rgba(255,224,238,.9),rgba(238,228,255,.9))}
.wondergrid .w .cap{display:block;font-size:10px;color:var(--muted);margin-top:3px}
.note{font-size:12.5px;line-height:1.65;color:#8a7d92;margin-top:9px}
.note b{color:#6f5f77}

/* ---------- 底部导航 ---------- */
.nav{position:fixed;bottom:0;left:50%;transform:translateX(-50%);width:100%;max-width:760px;
  display:flex;background:linear-gradient(180deg,rgba(255,251,248,.9),rgba(255,246,250,.98));
  border-top:1px solid rgba(217,160,102,.2);box-shadow:0 -4px 20px rgba(180,130,170,.1);
  padding-bottom:env(safe-area-inset-bottom);z-index:30}
.nav button{flex:1;padding:10px 0 9px;color:#b09cb8;font-size:11px;display:flex;flex-direction:column;align-items:center;gap:3px;font-weight:600}
.nav button .i{font-size:21px}
.nav button.on{color:var(--pink-d)}

/* 家长 */
.parent{padding:16px}
.pinpad input{width:100%;font-size:22px;text-align:center;letter-spacing:8px;padding:15px;border-radius:16px;border:2px solid var(--line);background:#fff;color:var(--ink)}
.pinpad input:focus{outline:none;border-color:var(--pink)}
.setrow{display:flex;justify-content:space-between;align-items:center;gap:12px;padding:13px 0;border-bottom:1px solid rgba(217,160,102,.16)}
.setrow:last-child{border:none}
.seg{display:flex;gap:6px}
.seg button{padding:8px 13px;border-radius:12px;background:rgba(184,124,190,.1);font-weight:700;font-size:13px;color:#8a6f8f}
.seg button.on{background:linear-gradient(135deg,var(--pink),var(--lav));color:#fff}
.toast{position:fixed;left:50%;bottom:94px;transform:translateX(-50%);
  background:linear-gradient(135deg,var(--pink-d),var(--lav-d));color:#fff;
  padding:12px 22px;border-radius:30px;font-size:14px;font-weight:600;z-index:60;opacity:0;
  transition:opacity .25s;pointer-events:none;max-width:88%;box-shadow:0 10px 28px rgba(184,124,190,.4)}
.toast.show{opacity:.98}

/* 2026 儿童友好视觉：清晰、柔软、不制造进度压力 */
.learning-home{display:inline-flex;align-items:center;gap:6px;margin:12px 16px 0;padding:10px 15px;border-radius:18px;background:rgba(255,255,255,.86);border:1px solid rgba(255,255,255,.95);box-shadow:0 8px 24px rgba(132,101,165,.13);font-size:13px;font-weight:800;color:#8063a0;text-decoration:none}
.guide.baibai{align-items:flex-start;padding:16px}.guide.baibai img{width:86px;height:86px;object-fit:contain;flex:none;filter:drop-shadow(0 7px 10px rgba(110,76,84,.16))}.guide .hello{font-size:18px;font-weight:900;color:#76568f;margin-bottom:4px}.guide .soft{font-size:12px;color:#998aa2;margin-top:5px}
.math-baibai{width:86px;height:86px;position:relative;display:inline-block;flex:none}.guide.baibai .math-baibai img.pet-body,.math-baibai img.pet-body{width:100%;height:100%;object-fit:contain;filter:drop-shadow(0 7px 10px rgba(110,76,84,.16))}.pet-layer{position:absolute;z-index:3;display:flex;align-items:center;justify-content:center}.guide.baibai .pet-layer img,.pet-layer img{width:100%;height:auto;filter:none}.recommend{grid-column:1/-1;display:flex;align-items:center;gap:10px;margin:-3px 0 17px;padding:13px 15px;border-radius:18px;background:rgba(255,255,255,.76);border:1px solid rgba(255,255,255,.95);font-size:12px;color:#7a687f}.recommend b{white-space:nowrap;color:#76568f}.recommend span{flex:1;line-height:1.5}.recommend .btn{padding:9px 12px;font-size:12px;white-space:nowrap}
.exam-picks{display:grid;grid-template-columns:1fr 1fr;gap:12px}.exam-pick{padding:18px 12px;border-radius:18px;background:linear-gradient(145deg,#fff7fa,#f0ebff);border:1px solid var(--line);font-weight:900;color:#6c5775}.exam-summary{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;margin:15px 0}.exam-summary div{padding:14px 8px;border-radius:16px;background:#f7f1fb;text-align:center}.exam-summary b{display:block;font-size:22px;color:#76568f}.exam-summary small{font-size:11px;color:#9b8aa3}
.map-hero{padding:8px 0 2px}.map-hero h2{font-size:27px;line-height:1.25;margin:0 0 7px;color:#55415e}.map-hero p{margin:0;font-size:14px;color:#8b7b93;line-height:1.65}
.scratch{margin-top:15px;border:1px solid rgba(154,130,212,.22);border-radius:18px;overflow:hidden;background:rgba(255,255,255,.68)}
.scratch-toggle{width:100%;padding:12px 15px;text-align:left;font-weight:800;color:#796394}.scratch-body{padding:10px}.scratch-tools{display:flex;flex-wrap:wrap;gap:8px;margin-bottom:8px}.scratch-tools button{padding:7px 12px;border-radius:11px;background:#f0e9fb;font-weight:700;color:#725d8d}.scratch-tools button.on{background:#9a82d4;color:white}.scratch-tools [data-template]{background:#fff5eb;color:#8c6a49}.scratch canvas{width:100%;height:190px;display:block;border-radius:12px;background-color:#fff;touch-action:none}.scratch canvas.grid{background-image:linear-gradient(#e9e2f2 1px,transparent 1px),linear-gradient(90deg,#e9e2f2 1px,transparent 1px);background-size:24px 24px}.scratch canvas.vertical{background-image:linear-gradient(90deg,transparent 49%,#d8cde7 50%,transparent 51%),linear-gradient(#eee8f5 1px,transparent 1px);background-size:100% 100%,100% 38px}.scratch canvas.numberline{background-image:linear-gradient(transparent 49%,#8d779d 50%,transparent 51%),repeating-linear-gradient(90deg,transparent 0 39px,#b9a9c7 40px 41px);background-size:100% 100%,100% 30px;background-position:0,0 95px}
.baibai-tip{display:flex;align-items:center;gap:10px;margin-top:15px;padding:11px 13px;border-radius:16px;background:linear-gradient(135deg,#fff3f7,#f2edff);font-size:13px;line-height:1.5;color:#705f78}.baibai-tip img{width:44px;height:44px;object-fit:contain}
.subject-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:9px}.subject-card{padding:14px 10px;border-radius:17px;background:linear-gradient(145deg,#fff7fa,#f5f0ff);text-align:center;text-decoration:none;color:#695773;border:1px solid rgba(217,160,102,.2)}.subject-card b{display:block;margin:5px 0 2px}.subject-card small{color:#9a8aa2}.parent-head{display:flex;align-items:center;gap:12px}.parent-head img{width:72px;height:72px;object-fit:contain}
@media(min-width:620px){.map{display:grid;grid-template-columns:1fr 1fr;gap:15px}.map>.guide,.map>.wonderbar,.map>.map-hero{grid-column:1/-1}.civ{margin-bottom:0}.depths{display:grid;grid-template-columns:1fr 1fr;gap:15px}.depths>.guide{grid-column:1/-1}.depth{margin-bottom:0}.stage{max-width:650px;margin:auto}}
@media(max-width:430px){.topbar{padding-left:12px;padding-right:12px}.topbar h1{font-size:17px}.purse{gap:4px}.chip{padding:5px 8px}.math-baibai{width:76px;height:76px}.subject-grid{grid-template-columns:1fr}.subject-card{display:flex;align-items:center;justify-content:space-between;text-align:left;padding:12px 15px}.recommend{align-items:flex-start;flex-wrap:wrap}.recommend span{min-width:180px}.recommend .btn{width:100%}}

/* 数学探险视觉 v2：像一本可以走进去的探索手账 */
:root{--ink:#4b5368;--muted:#8790a3;--pink:#7d83dd;--pink-d:#626bc7;--lav:#70b6cc;--lav-d:#4e91aa;--rose:#d5a657;--line:rgba(102,112,154,.18);--glass:rgba(255,255,255,.9)}
body{background:radial-gradient(circle at 10% 0,#e7f5ff 0,transparent 30%),radial-gradient(circle at 100% 12%,#eee9ff 0,transparent 34%),linear-gradient(155deg,#fffdf7,#f5f4ee 48%,#eaf1f8);background-attachment:fixed;overflow-x:hidden}
.learning-home{color:#6468a3;border:1px solid rgba(110,112,166,.12);box-shadow:0 7px 18px rgba(68,83,115,.1)}
.topbar{background:rgba(255,253,248,.92);box-shadow:0 4px 16px rgba(61,75,106,.08)}.topbar h1{-webkit-text-fill-color:initial;background:none;color:#53617f;letter-spacing:.03em}.purse{font-size:11px;gap:4px}.chip{padding:5px 7px;border-color:rgba(99,112,150,.13);box-shadow:none}
.map{position:relative;padding:12px 16px 28px;display:block}.map-hero{padding:12px 3px 5px}.map-hero h2{font-size:25px;color:#46516c;letter-spacing:-.02em}.map-hero p{color:#7f899d}.guide.baibai{background:linear-gradient(135deg,#fffefb,#eef6ff);border:1px solid rgba(255,255,255,.96);box-shadow:0 12px 32px rgba(64,81,112,.11);margin:10px 0 12px}.guide .hello{color:#59648c}.guide .soft{color:#8792a6}
.recommend{margin:0 0 15px;background:#fff;border:1px solid rgba(102,112,154,.13);box-shadow:0 8px 20px rgba(64,81,112,.07);color:#737e94}.recommend b{color:#56628a}.recommend .btn{background:linear-gradient(135deg,#717bd5,#63a9c1);box-shadow:none}
.wonderbar{position:relative;margin:0 0 17px;padding:13px 14px;background:rgba(255,255,255,.66);border:1px dashed rgba(93,109,158,.28)}.wonderbar .t{color:#66718e}.wonderbar .row{justify-content:space-between;gap:5px}.wonderbar .w{font-size:25px}.wonderbar .w:not(.got){filter:grayscale(1) opacity(.24)}
.civ{min-height:104px;margin:0 0 13px 24px;padding:14px 38px 14px 15px;border-radius:20px;background:rgba(255,255,255,.91);border:1px solid rgba(255,255,255,.98);box-shadow:0 9px 24px rgba(61,76,107,.09);overflow:visible}.map:after{content:"";position:absolute;left:26px;top:430px;bottom:34px;border-left:3px dotted rgba(102,112,154,.2);z-index:-1}.civ:before{content:"";position:absolute;left:-22px;top:45px;width:13px;height:13px;border-radius:50%;background:#fff;border:4px solid #7e88d9;box-shadow:0 0 0 4px rgba(126,136,217,.13)}.civ.locked{background:rgba(246,247,249,.82);filter:none;color:#a1a8b4}.civ.locked:before{border-color:#c8cbd2}.civ.locked .ico,.civ.locked .info{filter:grayscale(1);opacity:.38}.civ .ico{font-size:36px;width:42px}.civ .nm{font-size:17px;color:#4f5b78;flex-wrap:wrap;line-height:1.35}.civ .tag{font-size:9px;background:#e9e9fb;color:#656ca6;padding:3px 7px}.civ .pl{color:#8992a4}.civ .bl{font-size:11px;color:#788398;margin-top:5px;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden}.civ .st{right:12px;top:12px;color:#d29e3e}.civ .lockicon{right:13px;top:38px;font-size:15px;opacity:.28}
.depth,.qcard,.readcard,.panel{border-color:rgba(255,255,255,.96);box-shadow:0 11px 28px rgba(61,76,107,.1)}.depth .nm,.readcard .h,.panel h3{color:#52607d}.btn{background:linear-gradient(135deg,#717bd5,#62a8c0);box-shadow:0 8px 18px rgba(83,104,167,.23)}.nav{width:100vw;max-width:min(760px,100vw);background:rgba(255,254,251,.95);border-color:rgba(95,109,150,.12);box-shadow:0 -5px 20px rgba(61,76,107,.08)}.nav button.on{color:#626bc7}.progress i{background:linear-gradient(90deg,#717bd5,#62a8c0)}
.wondergrid .w{filter:grayscale(1);opacity:.3;background:#f1f2f4}.wondergrid .w.got{filter:none;opacity:1;background:linear-gradient(135deg,#eef1ff,#e5f6fb)}
.review-row{width:100%;display:grid;grid-template-columns:34px 1fr auto;grid-template-areas:"ico name go" "ico sub go";align-items:center;gap:2px 9px;padding:13px 3px;border-bottom:1px dashed rgba(102,112,154,.17);text-align:left}.review-row>span{grid-area:ico;font-size:25px}.review-row>b{grid-area:name;color:#56627e}.review-row>small{grid-area:sub;color:#8a94a7}.review-row>i{grid-area:go;color:#6570bd;font-style:normal;font-weight:800;font-size:12px}
.math-parent-entry{display:block;margin:20px auto 4px;padding:10px 18px;border-radius:16px;background:rgba(255,255,255,.74);color:#69738d;font-size:12px;font-weight:800;box-shadow:0 7px 18px rgba(61,76,107,.08)}
@media(max-width:430px){.map:after{top:455px}.civ{margin-left:21px;width:calc(100% - 21px)}.guide .bubble,.recommend span{min-width:0;overflow-wrap:anywhere}.recommend .btn{width:auto;margin-left:auto}.purse .chip{font-size:10px}.topbar h1{font-size:16px}}
</style>
</head>
<body>
<div id="app">
  <a class="learning-home" id="learningHome" href="https://nevergiveup0618.github.io/learning/">← 返回学习导航</a>
  <div class="topbar">
    <button class="back hidden" id="backBtn">‹</button>
    <h1 id="title">数学奇境</h1>
    <div class="purse">
      <span class="chip">🪙<span id="coinN">0</span></span>
      <span class="chip">🎡<span id="tkN">0</span></span>
    </div>
  </div>
  <div id="screen"></div>
  <nav class="nav" id="nav">
    <button data-v="map" class="on"><span class="i">🗺️</span>探险</button>
    <button data-v="review"><span class="i">🧩</span>复习</button>
    <button data-v="exam"><span class="i">📝</span>测验</button>
    <button data-v="rewards"><span class="i">🏺</span>收藏</button>
  </nav>
</div>
<div class="toast" id="toast"></div>
<script src="data.js"></script>
<script src="app.js"></script>
